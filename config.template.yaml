# ── Datonis Edge Server Configuration Template ──────────────────────────────
# Copy this file to config.yaml and fill in your values before first launch.
# ─────────────────────────────────────────────────────────────────────────────

server:
  host: 0.0.0.0
  port: 8082
  # IMPORTANT: Change this to a random secret string before deploying
  secret_key: CHANGE-ME-BEFORE-DEPLOYING
  debug: false

auth:
  default_username: admin
  # Leave default_password_hash empty — on first launch the server
  # auto-generates a bcrypt hash for the default password "changeme".
  # After first login, change it via Settings.
  default_password_hash: ""

cloud:
  protocol: https
  endpoint_url: https://api.datonis.io:443
  api_key: ""
  secret_key: ""
  gateway_key: ""
  edge_id: edge-001
  timeout_secs: 10
  batch_size: 100
  heartbeat_interval_secs: 60
  retry_on_status: [500, 502, 503, 504]
  ssl_verify: true

database:
  path: ../data/edge_server.db
  retention_days: 7

logging:
  level: INFO
  file: ../logs/edge_server.log
